    <path d="M78 114 c3 -3 6 -3 8 -1 c1 1 1 4 -1 6 c-3 3 -6 3 -8 1 c-1 -1 -1 -4 1 -6 z" />
    <path d="M86 106 c3 -3 6 -3 8 -1 c1 1 1 4 -1 6 c-3 3 -6 3 -8 1 c-1 -1 -1 -4 1 -6 z" />
    <path d="M76 122 l10 -10" />

    <!-- Musical Note -->
