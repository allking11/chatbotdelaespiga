    <!-- Heart -->
    <path d="M85 30 c-3 -3 -7 -3 -10 0 c-2 2 -2 5 0 7 l10 10 l10 -10 c2 -2 2 -5 0 -7 c-3 -3 -7 -3 -10 0 z" />
    
    <!-- Cloud -->
